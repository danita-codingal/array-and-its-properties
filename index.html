<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAY AND ITS PROPERTIES</title>
</head>
<body>
    <h2>ARRAY AND ITS PROPERTIES</h2>
    <p>An array is a data structure that can hold a fixed number of values of the same type. It is used to store multiple values in a single variable, instead of declaring separate variables for each value. The properties of an array include:</p>
    <p id="demo"></p>
    <script>
        // Create an array
        var myArray = [1, 2, 3, 4, 5];

        // Display the length of the array
        document.getElementById("demo").innerHTML = "The length of the array is: " + myArray.length;


    </script>
</body>
</html>
